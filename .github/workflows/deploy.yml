name: Publish to PyPI & Deploy Docker to ECR

on:
  workflow_dispatch:
  push:
    branches: [ feature-pipeline-gpu, main ]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  ECR_REPOSITORY: tii-qag/bqa

jobs:
  # JOB 1: Publish package to PyPI/TestPyPI (branch-dependent)
  publish-to-pypi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build package
        run: poetry build

      - name: Validate branch
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" && "${{ github.ref }}" != "refs/heads/feature-pipeline-gpu" ]]; then
            echo "ERROR: This workflow should only run on 'main' or 'feature-pipeline-gpu' branches"
            echo "Current branch: ${{ github.ref }}"
            exit 1
          fi

      - name: Publish to PyPI (branch-dependent)
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "✅ Branch: main"
            echo "📦 Publishing to official PyPI..."
            poetry config pypi-token.pypi ${{ secrets.PYPI_API_TOKEN }}
            poetry publish --skip-existing
          elif [[ "${{ github.ref }}" == "refs/heads/feature-pipeline-gpu" ]]; then
            echo "✅ Branch: feature-pipeline-gpu"
            echo "🧪 Publishing to Test PyPI..."
            poetry config repositories.testpypi https://test.pypi.org/legacy/
            poetry config pypi-token.testpypi ${{ secrets.TEST_PYPI_API_TOKEN }}
            poetry publish -r testpypi --skip-existing
          else
            echo "❌ ERROR: Unknown branch: ${{ github.ref }}"
            exit 1
          fi

      - name: Wait for package availability
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Package published to PyPI"
          else
            echo "Waiting 30 seconds for package to be available on Test PyPI..."
            sleep 30
          fi

  # JOB 2: Build Docker image and push to ECR (depends on Job 1)
  build-and-push-docker:
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/feature-pipeline-gpu'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${AWS_REGION:-}" ]]; then
            echo "Missing AWS_REGION."
            echo "Ensure it exists under Settings -> Secrets and variables -> Actions -> Variables (Repository variables)."
            exit 1
          fi
          if [[ -z "${AWS_ROLE_TO_ASSUME:-}" ]]; then
            echo "Missing AWS_ROLE_TO_ASSUME."
            echo "Ensure it exists under Settings -> Secrets and variables -> Actions -> Variables (Repository variables)."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_BASE="${REGISTRY}/${{ env.ECR_REPOSITORY }}"

          echo "cpu_sha=${IMAGE_BASE}:feature-pipeline-gpu-cpu-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "cpu_latest=${IMAGE_BASE}:feature-pipeline-gpu-cpu-latest" >> "$GITHUB_OUTPUT"
          echo "gpu_sha=${IMAGE_BASE}:feature-pipeline-gpu-gpu-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "gpu_latest=${IMAGE_BASE}:feature-pipeline-gpu-gpu-latest" >> "$GITHUB_OUTPUT"

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tags.outputs.cpu_sha }}
            ${{ steps.tags.outputs.cpu_latest }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=cpu

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.gpu
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tags.outputs.gpu_sha }}
            ${{ steps.tags.outputs.gpu_latest }}
          provenance: false
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,mode=max,scope=gpu

      - name: Summary
        run: |
          echo "Pushed image(s):"
          echo "CPU:"
          echo "  ${{ steps.tags.outputs.cpu_sha }}"
          echo "  ${{ steps.tags.outputs.cpu_latest }}"
          echo "GPU:"
          echo "  ${{ steps.tags.outputs.gpu_sha }}"
          echo "  ${{ steps.tags.outputs.gpu_latest }}"

  # JOB 3: Register new AWS Batch job definition revisions (depends on Job 2)
  register-job-definitions:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/feature-pipeline-gpu'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare image URIs
        id: images
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REGISTRY="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "cpu=${REGISTRY}/${{ env.ECR_REPOSITORY }}:feature-pipeline-gpu-cpu-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "gpu=${REGISTRY}/${{ env.ECR_REPOSITORY }}:feature-pipeline-gpu-gpu-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Register GPU job definition (EKS)
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/gpu-jobdef.json <<'EOF'
          {
            "jobDefinitionName": "qag-batch-bqa-gpu",
            "type": "container",
            "retryStrategy": { "attempts": 2 },
            "eksProperties": {
              "podProperties": {
                "serviceAccountName": "aws-batch-sa",
                "containers": [{
                  "name": "bqa",
                  "image": "GPU_IMAGE_PLACEHOLDER",
                  "command": ["sh", "-c", "echo 'Started BQA process'; python3 /app/examples/small_ibm_heavy_hex.py"],
                  "resources": {
                    "requests": { "cpu": "1", "memory": "2048Mi", "nvidia.com/gpu": "1" },
                    "limits":   { "cpu": "1", "memory": "2048Mi", "nvidia.com/gpu": "1" }
                  }
                }]
              }
            },
            "propagateTags": false
          }
          EOF
          sed -i 's|GPU_IMAGE_PLACEHOLDER|${{ steps.images.outputs.gpu }}|' /tmp/gpu-jobdef.json
          RESULT=$(aws batch register-job-definition --region "${{ env.AWS_REGION }}" --cli-input-json file:///tmp/gpu-jobdef.json)
          echo "✅ GPU job definition registered:"
          echo "$RESULT" | jq '{jobDefinitionName, jobDefinitionArn, revision}'

      - name: Register CPU job definition (Fargate)
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/cpu-jobdef.json <<'EOF'
          {
            "jobDefinitionName": "qag-batch-bqa-cpu",
            "type": "container",
            "platformCapabilities": ["FARGATE"],
            "retryStrategy": { "attempts": 2 },
            "containerProperties": {
              "image": "CPU_IMAGE_PLACEHOLDER",
              "command": ["sh", "-c", "echo 'Started BQA process'; python /app/examples/full_size_ibm_heavy_hex.py"],
              "jobRoleArn": "arn:aws:iam::ACCOUNT_ID_PLACEHOLDER:role/BatchEcsTaskExecutionRole",
              "executionRoleArn": "arn:aws:iam::ACCOUNT_ID_PLACEHOLDER:role/BatchEcsTaskExecutionRole",
              "resourceRequirements": [
                { "value": "1.0", "type": "VCPU" },
                { "value": "2048", "type": "MEMORY" }
              ],
              "networkConfiguration": { "assignPublicIp": "DISABLED" },
              "fargatePlatformConfiguration": { "platformVersion": "LATEST" },
              "runtimePlatform": { "operatingSystemFamily": "LINUX", "cpuArchitecture": "X86_64" },
              "logConfiguration": { "logDriver": "awslogs" },
              "enableExecuteCommand": true
            },
            "propagateTags": false
          }
          EOF
          sed -i 's|CPU_IMAGE_PLACEHOLDER|${{ steps.images.outputs.cpu }}|' /tmp/cpu-jobdef.json
          sed -i 's|ACCOUNT_ID_PLACEHOLDER|${{ vars.AWS_ACCOUNT_ID }}|g' /tmp/cpu-jobdef.json
          RESULT=$(aws batch register-job-definition --region "${{ env.AWS_REGION }}" --cli-input-json file:///tmp/cpu-jobdef.json)
          echo "✅ CPU job definition registered:"
          echo "$RESULT" | jq '{jobDefinitionName, jobDefinitionArn, revision}'

      - name: Summary
        run: |
          echo "📋 Job definitions updated:"
          echo "  GPU: qag-batch-bqa-gpu → image ${{ steps.images.outputs.gpu }}"
          echo "  CPU: qag-batch-bqa-cpu → image ${{ steps.images.outputs.cpu }}"
